<!DOCTYPE html>
<html>

<head>
    <title>Grizzdle</title>
    <link rel="stylesheet" href="style.css?v=1.0.0">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <meta content="Grizzdle" property="og:title" />
    <meta content="Answer daily questions based on me, Grizz!" property="og:description" />
    <meta content="https://www.grizzdle.com/" property="og:url" />
    <meta content="https://www.grizzdle.com/Bear_emoji.png" property="og:image" />
    <meta content="#6F4E37" data-react-helmet="true" name="theme-color" />
    <meta name="grizzdle-api-base-url" content="https://grizzdle.onrender.com">
</head>

<body>
    <header>
    <button id="archive-button" onclick="window.location='archive.html'">View Archive</button>
    <img src="Bear_emoji.png" alt="Grizz Emoji" class="emoji">
    </header>
    <h1>Grizzdle</h1>
    <section id="account-link">
    <button id="login-page-button" type="button" onclick="window.location='login.html'">Login / Account</button>
    </section>
    <div id="question"></div>
    <div id="options"></div>
    <p id="result"></p>
    <div id="share-container" class="hidden">
    <button id="share-button" type="button">Share Result</button>
    </div>
    <p>
    Correct: <span id="correctCount"></span> |
    Incorrect: <span id="incorrectCount"></span>
    </p>
    <script src="script.js?v=1.0.0"></script>
</body>

</html>
