<!DOCTYPE html>
<html>

<head>
    <title>Grizzdle</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <meta content="Grizzdle" property="og:title" />
    <meta content="Answer daily questions based on me, Grizz!" property="og:description" />
    <meta content="https://www.grizzdle.com/" property="og:url" />
    <meta content="https://images.emojiterra.com/google/noto-emoji/unicode-16.0/color/svg/1f43b.svg" property="og:image" />
    <meta content="#6F4E37" data-react-helmet="true" name="theme-color" />
</head>

<header>
    <button id="archive-button" onclick="window.location='archive.html'">View Archive</button>
    <img src="https://images.emojiterra.com/google/noto-emoji/unicode-16.0/color/svg/1f43b.svg" alt="Grizz Emoji" class="emoji">
</header>

<body>
    <h1>Grizzdle</h1>
    <div id="question"></div>
    <div id="options"></div>
    <p id="result"></p>
    <p>
    Correct: <span id="correctCount"></span> |
    Incorrect: <span id="incorrectCount"></span>
    </p>
    <script src="script.js"></script>
</body>

</html>
